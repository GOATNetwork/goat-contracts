name: test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - run: cd gensrv && go build .
      - run: cd gensrv && gofmt -d .
      - run: cd gensrv && go test -v .
